{% extends 'base.html' %}
{% load static %}

{% block title %}Cadastrar Cliente{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/clientes.css' %}">
{% endblock %}

{% block content %}

<div class="content-panel">
    <div class="form-wrapper">
        <div class="form-title-box">
            <h4>Cadastrar Cliente</h4>
        </div>

        <div class="form-box">
            <form method="POST">
                {% csrf_token %}

                <div class="row g-4 mx-0">

                    <div class="col-12">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" id="nome" name="nome" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" id="cpf" name="cpf" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="contato" class="form-label">Contato</label>
                        <input type="text" id="contato" name="contato" class="form-control" required>
                    </div>

                    <div class="col-md-3">
                        <label for="numero" class="form-label">Número</label>
                        <input type="text" id="numero" name="numero" class="form-control" required>
                    </div>

                    <div class="col-md-9">
                        <label for="rua" class="form-label">Rua</label>
                        <input type="text" id="rua" name="rua" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="bairro" class="form-label">Bairro</label>
                        <input type="text" id="bairro" name="bairro" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="cidade" class="form-label">Cidade</label>
                        <input type="text" id="cidade" name="cidade" class="form-control" required>
                    </div>

                </div>

                <div class="mt-4 d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn-salvar">Salvar</button>
                    <a href="{% url 'clientes:listar_clientes' %}" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
