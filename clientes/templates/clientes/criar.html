{% extends 'base.html' %}

{% block title %}Cadastrar Cliente{% endblock %}

{% block extra_css %}
<style>
    .content-panel {
        background-color: #f8f8f8;
        border: 1px solid #bfc7ce;
        min-height: 605px;
        padding: 18px;
    }

    .form-title-box {
        border: 1px solid #bfc7ce;
        background-color: #f3f3f3;
        padding: 10px 18px;
        margin-bottom: 18px;
    }

    .form-title-box h4 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        color: #3f4c58;
    }

    .form-box {
        border: 1px solid #bfc7ce;
        background-color: #f8f8f8;
        padding: 22px 18px 28px 18px;
        max-width: 760px;
    }

    .form-label {
        font-size: 15px;
        font-weight: 600;
        color: #3f4c58;
        margin-bottom: 6px;
    }

    .form-control {
        border: 2px solid #c4ced7;
        border-radius: 0;
        height: 40px;
    }

    .form-control:focus {
        border-color: #9db7cc;
        box-shadow: none;
    }

    .btn-salvar {
        background-color: #b23ad6;
        border: none;
        color: white;
        font-weight: 600;
        padding: 10px 28px;
        border-radius: 4px;
    }

    .btn-salvar:hover {
        background-color: #9c2fc0;
        color: white;
    }

    .btn-cancelar {
        background-color: #6c757d;
        border: none;
        color: white;
        font-weight: 600;
        padding: 10px 24px;
        border-radius: 4px;
        text-decoration: none;
        display: inline-block;
    }

    .btn-cancelar:hover {
        background-color: #5c636a;
        color: white;
    }
</style>
{% endblock %}

{% block content %}

<div class="content-panel">

    <div class="form-title-box">
        <h4>Cadastrar Cliente</h4>
    </div>

    <div class="form-box">
        <form method="POST">
            {% csrf_token %}

            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Nome</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">CPF</label>
                    <input type="text" name="cpf" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Contato</label>
                    <input type="text" name="contato" class="form-control" required>
                </div>
            </div>

            <div class="mt-4 d-flex gap-2 justify-content-center">
                <button type="submit" class="btn-salvar">Salvar</button>
                <a href="{% url 'listar_clientes' %}" class="btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>

</div>

{% endblock %}
