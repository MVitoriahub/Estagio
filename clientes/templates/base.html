<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #d8ecf5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .topbar {
            background-color: #9aa9b8;
            height: 55px;
            border-radius: 4px 4px 0 0;
        }

        .window-dots {
            display: flex;
            gap: 8px;
            padding: 18px 15px;
        }

        .window-dots span {
            width: 12px;
            height: 12px;
            background-color: #7f8c99;
            border-radius: 50%;
            display: inline-block;
        }

        .main-wrapper {
            background-color: #c8e6f2;
            padding: 18px;
            min-height: calc(100vh - 55px);
            border-radius: 0 0 4px 4px;
        }

        .sidebar {
            background-color: #f7f7f7;
            border: 1px solid #c7c7c7;
            min-height: 620px;
            padding: 14px 10px;
        }

        .sidebar-title {
            font-size: 14px;
            color: #7b8a97;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .sidebar .nav-link {
            color: #2f3d4a;
            text-align: center;
            padding: 16px 10px;
            margin-bottom: 12px;
            border-radius: 4px;
            font-weight: 500;
        }

        .sidebar .nav-link:hover {
            background-color: #ddeef8;
        }

        .sidebar .nav-link.active {
            background-color: #1e90ff;
            color: white;
        }

        .content-area {
            width: 100%;
            min-height: 620px;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<div class="container-fluid p-3">

    <div class="topbar">
        <div class="window-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="row g-3">

            <!-- MENU LATERAL -->
            <div class="col-md-2">
                <div class="sidebar">
                    <div class="sidebar-title">
                        <i class="bi bi-house-door-fill"></i> Dashboard
                    </div>

                    <a href="#" class="nav-link active d-block">Gerenciar Produto</a>
                    <a href="{% url 'listar_clientes' %}" class="nav-link d-block">Gerenciar Cliente</a>
                </div>
            </div>

            <!-- CONTEÚDO -->
            <div class="col-md-10">
                <div class="content-area">
                    {% block content %}
                    {% endblock %}
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
